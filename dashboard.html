<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Job Hunter</title>
<style>
  :root {
    --bg: #f6f7f9; --card: #ffffff; --text: #16181d; --muted: #6b7280;
    --border: #e5e7eb; --accent: #2563eb; --accent-soft: #eff6ff;
    --good: #16803c; --good-soft: #ecfdf3; --warn: #b45309; --warn-soft: #fffbeb;
    --purple: #7c3aed; --purple-soft: #f3efff; --red: #b91c1c; --red-soft: #fef2f2;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101216; --card: #1a1d23; --text: #e8eaee; --muted: #9aa1ac;
      --border: #2a2e36; --accent: #7aa2ff; --accent-soft: #1c2740;
      --good: #4ade80; --good-soft: #12271a; --warn: #fbbf24; --warn-soft: #2b2412;
      --purple: #b794f6; --purple-soft: #251c38; --red: #f87171; --red-soft: #331515;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  header { padding: 12px 20px; border-bottom: 1px solid var(--border);
           background: var(--card); position: sticky; top: 0; z-index: 5; }
  .hrow { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .hrow + .hrow { margin-top: 8px; }
  h1 { font-size: 17px; margin: 0 8px 0 0; }
  #status { color: var(--muted); font-size: 12px; flex: 1; min-width: 180px; }
  input[type=search], select {
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; font-size: 13px; }
  input[type=search] { width: 180px; }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 8px;
           padding: 6px 13px; font-size: 13px; cursor: pointer; }
  button.ghost { background: transparent; color: var(--accent);
                 border: 1px solid var(--border); }
  .views { display: flex; gap: 4px; }
  .views button { background: transparent; color: var(--muted); font-weight: 600;
                  border: 1px solid transparent; }
  .views button.active { background: var(--accent-soft); color: var(--accent);
                         border-color: var(--border); }
  .tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .tabs button { background: transparent; color: var(--muted);
                 border: 1px solid transparent; padding: 5px 10px; }
  .tabs button.active { background: var(--accent-soft); color: var(--accent);
                        border-color: var(--border); }
  .tabs .n { font-size: 10.5px; opacity: .75; }
  main { max-width: 1020px; margin: 0 auto; padding: 20px; }
  .job { background: var(--card); border: 1px solid var(--border);
         border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .job.is-new { border-left: 3px solid var(--accent); }
  .row1 { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
  .title { font-weight: 600; font-size: 15px; }
  .score { font-weight: 700; font-size: 12px; padding: 2px 8px; border-radius: 999px;
           background: var(--warn-soft); color: var(--warn); }
  .score.high { background: var(--good-soft); color: var(--good); }
  .meta { color: var(--muted); font-size: 12.5px; margin: 2px 0 6px; }
  .src, .cat { text-transform: uppercase; letter-spacing: .04em; font-size: 10.5px;
         border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; }
  .cat.aiml { color: var(--purple); border-color: var(--purple); }
  .cat.devops { color: var(--warn); border-color: var(--warn); }
  .cat.swe { color: var(--accent); border-color: var(--accent); }
  .stagechip { font-size: 10.5px; font-weight: 700; border-radius: 4px; padding: 1px 6px;
               text-transform: uppercase; letter-spacing: .04em; }
  .stagechip.applied { background: var(--accent-soft); color: var(--accent); }
  .stagechip.interviewing { background: var(--warn-soft); color: var(--warn); }
  .stagechip.offer { background: var(--good-soft); color: var(--good); }
  .stagechip.rejected { background: var(--red-soft); color: var(--red); }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin: 6px 0; }
  .chip { font-size: 11px; background: var(--accent-soft); color: var(--accent);
          border-radius: 999px; padding: 2px 8px; }
  .desc { color: var(--muted); font-size: 12.5px; max-height: 3em; overflow: hidden; }
  .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
  .actions a { text-decoration: none; }
  .actions select { padding: 5px 8px; }
  .notes { width: 100%; margin-top: 8px; background: var(--bg); color: var(--text);
           border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px;
           font: 12.5px/1.4 inherit; display: none; }
  .empty { text-align: center; color: var(--muted); padding: 60px 0; }
  .sechead { display: flex; align-items: center; gap: 10px; font-weight: 700;
             font-size: 12px; text-transform: uppercase; letter-spacing: .06em;
             color: var(--muted); margin: 18px 2px 10px; }
  .sechead::after { content: ""; flex: 1; border-top: 1px solid var(--border); }
  .sechead.fresh { color: var(--good); }
  .age { font-size: 11px; font-weight: 600; border-radius: 999px; padding: 1px 7px;
         background: var(--bg); border: 1px solid var(--border); color: var(--muted); }
  .age.fresh { background: var(--good-soft); color: var(--good);
               border-color: transparent; }
  .exp { font-size: 10.5px; font-weight: 700; border-radius: 999px; padding: 1px 7px;
         background: var(--bg); border: 1px solid var(--border); color: var(--muted); }
  .exp.senior, .exp.lead { color: var(--warn); border-color: var(--warn); }
  .err { color: var(--warn); }
  details.dir { background: var(--card); border: 1px solid var(--border);
                border-radius: 12px; padding: 10px 16px; margin-bottom: 14px; }
  details.dir summary { cursor: pointer; font-weight: 600; color: var(--muted); }
  .dirgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
             gap: 8px; margin-top: 10px; }
  .dirgrid a { display: block; padding: 8px 10px; border: 1px solid var(--border);
               border-radius: 8px; text-decoration: none; color: var(--text); }
  .dirgrid a:hover { border-color: var(--accent); }
  .dirgrid .dn { font-weight: 600; font-size: 13px; }
  .dirgrid .dd { color: var(--muted); font-size: 11.5px; }
  .repo .stars { font-weight: 700; color: var(--warn); }
  .mode-badge { font-size: 10.5px; font-weight: 700; border-radius: 4px;
                padding: 1px 6px; text-transform: uppercase; }
  .mode-badge.rising { background: var(--purple-soft); color: var(--purple); }
  .mode-badge.contribute { background: var(--good-soft); color: var(--good); }
</style>
</head>
<body>
<header>
  <div class="hrow">
    <h1>🎯 Job Hunter</h1>
    <div class="views" id="views">
      <button data-view="jobs" class="active">Jobs</button>
      <button data-view="gigs">Freelance</button>
      <button data-view="repos">AI Repos</button>
    </div>
    <div id="status">loading…</div>
    <button id="refresh">Fetch now</button>
  </div>
  <div class="hrow" id="filters">
    <div class="tabs" id="tabs">
      <button data-stage="inbox" class="active">Inbox <span class="n"></span></button>
      <button data-stage="applied">Applied <span class="n"></span></button>
      <button data-stage="interviewing">Interviewing <span class="n"></span></button>
      <button data-stage="offer">Offer <span class="n"></span></button>
      <button data-stage="rejected">Rejected <span class="n"></span></button>
      <button data-stage="hidden">Hidden</button>
      <button data-stage="archived">Archived <span class="n"></span></button>
      <button data-stage="all">All</button>
    </div>
    <select id="category">
      <option value="">All categories</option>
      <option value="swe">Software Eng</option>
      <option value="devops">DevOps</option>
      <option value="aiml">AI / ML</option>
      <option value="other">Other</option>
    </select>
    <input type="search" id="q" placeholder="Search title, company…">
    <select id="source"><option value="">All sources</option></select>
    <select id="minscore">
      <option value="0">Any score</option>
      <option value="4" selected>Score ≥ 4</option>
      <option value="8">Score ≥ 8</option>
      <option value="12">Score ≥ 12</option>
    </select>
    <select id="expmax" title="Hide jobs asking for more experience than this">
      <option value="">Any experience</option>
      <option value="1">≤ 1 yr (intern/grad)</option>
      <option value="2">≤ 2 yrs (junior)</option>
      <option value="4">≤ 4 yrs</option>
      <option value="6">≤ 6 yrs (mid)</option>
      <option value="8">≤ 8 yrs (senior)</option>
    </select>
  </div>
</header>
<main>
  <details class="dir" id="dir" style="display:none">
    <summary id="dirTitle">More platforms</summary>
    <div class="dirgrid" id="dirGrid"></div>
  </details>
  <div id="list"><div class="empty">Loading…</div></div>
</main>
<script>
const $ = s => document.querySelector(s);
let view = 'jobs', stage = 'inbox', platforms = null, freshHours = 24, expInit = false;
const STAGES = ['new','seen','applied','interviewing','offer','rejected','hidden','archived'];
const CAT_LABEL = {swe:'SWE', devops:'DevOps', aiml:'AI/ML', other:''};

async function api(path, opts) {
  const r = await fetch(path, opts);
  return r.json();
}
function esc(s) {
  return (s || '').toString().replace(/[&<>"]/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
function fmtStars(n) {
  return n >= 1000 ? (n / 1000).toFixed(1).replace('.0','') + 'k' : n;
}
// Best timestamp for a job: the board's posted_at when it parses (ISO,
// RFC822, or epoch-ms from lever), else when we first discovered it.
function jobTime(j) {
  const p = String(j.posted_at || '').trim();
  let t = /^\d{12,}$/.test(p) ? +p : Date.parse(p);
  if (isNaN(t)) t = Date.parse(j.first_seen || '');
  return t;
}
function isFresh(j) {
  const t = jobTime(j);
  return !isNaN(t) && (Date.now() - t) < freshHours * 3600e3;
}
function agoLabel(j) {
  const t = jobTime(j);
  if (isNaN(t)) return '';
  const h = Math.max(0, (Date.now() - t) / 3600e3);
  return h < 1 ? 'just in' : h < 24 ? Math.round(h) + 'h ago'
       : Math.round(h / 24) + 'd ago';
}
function expLabel(j) {
  const mn = j.exp_min, mx = j.exp_max;
  if (mn == null && mx == null) return '';        // unknown — no badge
  if (mn != null && mx != null)
    return mn === mx ? `${mn} yr${mn === 1 ? '' : 's'}` : `${mn}–${mx} yrs`;
  if (mn != null) return `${mn}+ yrs`;
  return `≤ ${mx} yrs`;
}

async function loadStatus() {
  const s = await api('/api/status');
  freshHours = s.fresh_hours || 24;
  // Seed the experience filter from config once, so the inbox defaults to your
  // level; after that, respect whatever the user picks.
  if (!expInit) {
    expInit = true;
    const mx = (s.experience || {}).max_years;
    if (mx != null && $('#expmax').querySelector(`option[value="${mx}"]`))
      $('#expmax').value = String(mx);
  }
  const last = s.last_poll ? new Date(s.last_poll).toLocaleString() : 'never';
  const errs = Object.keys(s.errors || {});
  const kind = view === 'gigs' ? 'gig' : 'job';
  const counts = (s.counts || {})[kind] || {};
  const total = Object.values(counts).reduce((a, b) => a + b, 0);
  const inbox = (counts.new || 0) + (counts.seen || 0);
  $('#status').innerHTML =
    `${total} ${kind}s · ${inbox} in inbox · ${counts.applied || 0} applied · ` +
    `last fetch ${last} · ${s.storage}` +
    (errs.length ? ` · <span class="err" title="${esc(errs.map(e => e + ': ' + s.errors[e]).join('\n'))}">⚠ ${errs.length} source issues</span>` : '');
  // per-stage tab counts
  document.querySelectorAll('#tabs button').forEach(b => {
    const st = b.dataset.stage, n = b.querySelector('.n');
    if (!n) return;
    n.textContent = st === 'inbox' ? (inbox ? inbox : '')
                  : (counts[st] ? counts[st] : '');
  });
  const sel = $('#source');
  const srcs = (s.sources || {})[kind] || [];
  const cur = sel.value;
  sel.innerHTML = '<option value="">All sources</option>';
  srcs.forEach(x => sel.add(new Option(x, x)));
  sel.value = cur;
}

function jobCard(j) {
  const isTracked = ['applied','interviewing','offer','rejected'].includes(j.stage);
  return `
    <div class="job ${j.stage === 'new' ? 'is-new' : ''}">
      <div class="row1">
        <span class="score ${j.score >= 8 ? 'high' : ''}">${j.score}</span>
        <span class="title">${esc(j.title)}</span>
        ${j.category && CAT_LABEL[j.category] ? `<span class="cat ${j.category}">${CAT_LABEL[j.category]}</span>` : ''}
        <span class="src">${esc(j.source)}</span>
        ${agoLabel(j) ? `<span class="age ${isFresh(j) ? 'fresh' : ''}">${agoLabel(j)}</span>` : ''}
        ${expLabel(j) ? `<span class="exp ${j.exp_level || ''}" title="required experience">${expLabel(j)}</span>` : ''}
        ${isTracked ? `<span class="stagechip ${j.stage}">${j.stage}</span>` : ''}
      </div>
      <div class="meta">${esc(j.company)}${j.location ? ' · ' + esc(j.location) : ''}
        ${j.posted_at ? ' · posted ' + esc(String(j.posted_at).slice(0, 10)) : ''}
        ${j.stage_updated && isTracked ? ' · ' + j.stage + ' on ' + esc(String(j.stage_updated).slice(0, 10)) : ''}</div>
      ${j.matched.length ? `<div class="chips">${j.matched.slice(0, 10).map(m => `<span class="chip">${esc(m)}</span>`).join('')}</div>` : ''}
      ${j.description ? `<div class="desc">${esc(j.description)}</div>` : ''}
      <div class="actions">
        <a href="${esc(j.url)}" target="_blank" rel="noopener">
          <button onclick="markSeen('${j.id}', '${j.stage}')">${view === 'gigs' ? 'Open gig' : 'Apply'} ↗</button></a>
        <select onchange="setStage('${j.id}', this.value)">
          ${STAGES.map(s => `<option value="${s}" ${s === j.stage ? 'selected' : ''}>${s === 'new' ? 'stage…' : s}</option>`).join('')}
        </select>
        <button class="ghost" onclick="setStage('${j.id}','applied')">✓ Applied</button>
        <button class="ghost" onclick="setStage('${j.id}','hidden')">Hide</button>
        <button class="ghost" onclick="toggleNotes('${j.id}')">Notes${j.notes ? ' •' : ''}</button>
      </div>
      <textarea class="notes" id="notes-${j.id}" placeholder="Notes: referral, contact, interview dates…"
        onblur="saveNotes('${j.id}', this.value)">${esc(j.notes || '')}</textarea>
    </div>`;
}

function repoCard(r) {
  return `
    <div class="job repo">
      <div class="row1">
        <span class="stars">★ ${fmtStars(r.stars)}</span>
        <span class="title">${esc(r.full_name)}</span>
        <span class="mode-badge ${r.mode}">${r.mode === 'rising' ? '🔥 rising' : '🤝 contribute'}</span>
        ${r.language ? `<span class="src">${esc(r.language)}</span>` : ''}
      </div>
      <div class="meta">${fmtStars(r.forks)} forks · ${r.open_issues} open issues
        · pushed ${esc(String(r.pushed_at).slice(0, 10))}</div>
      ${r.description ? `<div class="desc" style="max-height:none">${esc(r.description)}</div>` : ''}
      ${r.topics.length ? `<div class="chips">${r.topics.map(t => `<span class="chip">${esc(t)}</span>`).join('')}</div>` : ''}
      <div class="actions">
        <a href="${esc(r.url)}" target="_blank" rel="noopener"><button>View repo ↗</button></a>
        <a href="${esc(r.url)}/contribute" target="_blank" rel="noopener"><button class="ghost">Good first issues ↗</button></a>
        <a href="${esc(r.url)}/issues" target="_blank" rel="noopener"><button class="ghost">Issues ↗</button></a>
      </div>
    </div>`;
}

async function loadList() {
  const list = $('#list');
  if (view === 'repos') {
    const repos = await api('/api/repos');
    list.innerHTML = repos.length
      ? repos.map(repoCard).join('')
      : '<div class="empty">No repos yet — hit "Fetch now".</div>';
    return;
  }
  const p = new URLSearchParams({
    kind: view === 'gigs' ? 'gig' : 'job',
    stage,
    category: $('#category').value,
    min_score: view === 'gigs' ? '0' : $('#minscore').value,
    q: $('#q').value,
    source: $('#source').value,
    exp_max: view === 'gigs' ? '' : $('#expmax').value,
  });
  const jobs = await api('/api/jobs?' + p);
  if (!jobs.length) {
    list.innerHTML = '<div class="empty">Nothing here — hit "Fetch now" or loosen the filters.</div>';
    return;
  }
  // In the inbox, keep the last-24h finds visually apart from older ones
  // so a returning user sees what's actually new first.
  if (stage === 'inbox' || stage === 'all') {
    const fresh = jobs.filter(isFresh), older = jobs.filter(j => !isFresh(j));
    list.innerHTML =
      (fresh.length ? `<div class="sechead fresh">🔥 Fresh — last ${freshHours}h (${fresh.length})</div>` + fresh.map(jobCard).join('') : '') +
      (older.length ? `<div class="sechead">Older (${older.length})</div>` + older.map(jobCard).join('') : '');
  } else {
    list.innerHTML = jobs.map(jobCard).join('');
  }
}

async function loadDirectory() {
  const dir = $('#dir');
  if (view === 'repos') { dir.style.display = 'none'; return; }
  if (!platforms) platforms = await api('/api/platforms');
  const entries = platforms[view === 'gigs' ? 'freelance' : 'jobs'] || [];
  $('#dirTitle').textContent = view === 'gigs'
    ? `🌍 Freelance platforms directory (${entries.length})`
    : `🌍 More job boards (${entries.length})`;
  $('#dirGrid').innerHTML = entries.map(e =>
    `<a href="${esc(e.url)}" target="_blank" rel="noopener">
       <div class="dn">${esc(e.name)} ↗</div>
       ${e.note ? `<div class="dd">${esc(e.note)}</div>` : ''}</a>`).join('');
  dir.style.display = '';
}

async function setStage(id, st) {
  if (st === 'new') return;
  await api('/api/stage', {method: 'POST', body: JSON.stringify({id, stage: st})});
  loadList(); loadStatus();
}
function markSeen(id, cur) {
  if (cur === 'new') setStage(id, 'seen');
}
function toggleNotes(id) {
  const el = $('#notes-' + id);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
  if (el.style.display === 'block') el.focus();
}
async function saveNotes(id, notes) {
  await api('/api/notes', {method: 'POST', body: JSON.stringify({id, notes})});
}

$('#views').addEventListener('click', e => {
  if (!e.target.dataset.view) return;
  view = e.target.dataset.view;
  document.querySelectorAll('#views button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  $('#filters').style.display = view === 'repos' ? 'none' : '';
  loadDirectory(); loadStatus(); loadList();
});
$('#tabs').addEventListener('click', e => {
  if (!e.target.dataset.stage) return;
  stage = e.target.dataset.stage;
  document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  loadList();
});
$('#refresh').onclick = async () => {
  $('#status').textContent = 'fetching… (can take up to a minute)';
  try { await api('/api/refresh', {method: 'POST', body: '{}'}); } catch (e) {}
  setTimeout(() => { loadStatus(); loadList(); }, 4000);
  setTimeout(() => { loadStatus(); loadList(); }, 20000);
};
['q','source','minscore','category','expmax'].forEach(id =>
  $('#' + id).addEventListener('input', loadList));

loadStatus().then(loadList); loadDirectory();
setInterval(() => { loadStatus(); if (view !== 'repos') loadList(); }, 90000);
</script>
</body>
</html>
